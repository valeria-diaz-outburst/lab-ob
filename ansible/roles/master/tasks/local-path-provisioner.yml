---
- name: Download local-path-provisioner manifest
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/rancher/local-path-provisioner/v{{ local_path_provisioner_version }}/deploy/local-path-storage.yaml"
    dest: /tmp/local-path-storage.yaml
    mode: "0644"

- name: Apply local-path-provisioner manifest
  ansible.builtin.command: kubectl apply -f /tmp/local-path-storage.yaml
  environment:
    KUBECONFIG: /home/ansible/.kube/config

- name: Wait for local-path-provisioner to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/local-path-provisioner
    -n local-path-storage
    --timeout=120s
  environment:
    KUBECONFIG: /home/ansible/.kube/config
  changed_when: false

- name: Set local-path as default storage class
  ansible.builtin.command: >
    kubectl patch storageclass local-path
    -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
  environment:
    KUBECONFIG: /home/ansible/.kube/config
  register: patch_result
  failed_when:
    - patch_result.rc != 0
    - "'not patched' not in patch_result.stdout"
  changed_when: "'patched' in patch_result.stdout"
