---
- name: Check if Vault is already initialized
  ansible.builtin.command: >
    kubectl exec {{ vault_pod }} -n {{ vault_namespace }}
    -- vault status -format=json
  environment:
    KUBECONFIG: "{{ vault_kubeconfig }}"
  register: vault_status_raw
  failed_when: false
  changed_when: false

- name: Parse Vault status
  ansible.builtin.set_fact:
    vault_status: "{{ vault_status_raw.stdout | from_json }}"
  when: vault_status_raw.stdout != ""

- name: Initialize Vault
  ansible.builtin.command: >
    kubectl exec {{ vault_pod }} -n {{ vault_namespace }}
    -- vault operator init
    -key-shares={{ vault_key_shares }}
    -key-threshold={{ vault_key_threshold }}
    -format=json
  environment:
    KUBECONFIG: "{{ vault_kubeconfig }}"
  register: vault_init_raw
  when: not vault_status.initialized | default(false)

- name: Save init output to file on master
  ansible.builtin.copy:
    content: "{{ vault_init_raw.stdout }}"
    dest: "{{ vault_init_output_path }}"
    mode: "0600"
  when: vault_init_raw is not skipped

- name: Parse init output
  ansible.builtin.set_fact:
    vault_init: "{{ vault_init_raw.stdout | from_json }}"
  when: vault_init_raw is not skipped

- name: Show unseal keys and root token
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "SAVE THESE TO 1PASSWORD NOW"
      - "=========================================="
      - "Unseal Keys:"
      - "{{ vault_init.unseal_keys_b64 }}"
      - "Root Token: {{ vault_init.root_token }}"
      - "=========================================="
      - "Full output saved to: {{ vault_init_output_path }}"
  when: vault_init_raw is not skipped

- name: Unseal Vault with init keys
  ansible.builtin.command: >
    kubectl exec {{ vault_pod }} -n {{ vault_namespace }}
    -- vault operator unseal {{ item }}
  environment:
    KUBECONFIG: "{{ vault_kubeconfig }}"
  loop: "{{ vault_init.unseal_keys_b64[:vault_key_threshold] }}"
  when: vault_init_raw is not skipped
  no_log: true
