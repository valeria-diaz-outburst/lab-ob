---
- name: Check Vault seal status
  ansible.builtin.command: >
    kubectl exec {{ vault_pod }} -n {{ vault_namespace }}
    -- vault status -format=json
  register: vault_status_raw
  failed_when: false
  changed_when: false

- name: Parse Vault status
  ansible.builtin.set_fact:
    vault_status: "{{ vault_status_raw.stdout | from_json }}"

- name: Skip if already unsealed
  ansible.builtin.debug:
    msg: "Vault is already unsealed, nothing to do."
  when: not vault_status.sealed | default(true)

- name: Unseal Vault
  ansible.builtin.command: >
    kubectl exec {{ vault_pod }} -n {{ vault_namespace }}
    -- vault operator unseal {{ item }}
  loop: "{{ vault_unseal_keys }}"
  when: vault_status.sealed | default(true)
  no_log: true
