---
- name: Install apt transport prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Kubernetes apt signing key
  ansible.builtin.shell:
    cmd: curl -fsSL "{{ k8s_apt_key }}" | gpg --dearmor -o /etc/apt/keyrings/k8s.gpg
  args:
    creates: /etc/apt/keyrings/k8s.gpg

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/k8s.gpg] {{ k8s_apt_repo }} /"
    filename: kubernetes
    state: present

- name: Add Docker apt signing key
  ansible.builtin.shell:
    cmd: curl -fsSL "{{ docker_apt_key }}" | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] {{ docker_apt_repo }} {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install containerd.io
  ansible.builtin.apt:
    name: "containerd.io={{ containerd_version }}*"
    state: present
    update_cache: true

- name: Install kubelet, kubeadm, and kubectl
  ansible.builtin.apt:
    name:
      - "kubelet={{ k8s_version }}*"
      - "kubeadm={{ k8s_version }}*"
      - "kubectl={{ k8s_version }}*"
    state: present
    update_cache: true

- name: Hold Kubernetes packages at current version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
    - containerd.io
